<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Страницата не е намерена</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #dc2626 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: white;
        }
        .error-container {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        .error-code { font-size: 6rem; font-weight: bold; margin-bottom: 10px; }
        .error-message { font-size: 1.5rem; margin-bottom: 20px; }
        .back-link {
            display: inline-block;
            padding: 12px 24px;
            background: white;
            color: #1e40af;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-message">Страницата не е намерена</div>
        <a href="/" class="back-link">⚽ Към началната страница</a>
    </div>
</body>
</html>
